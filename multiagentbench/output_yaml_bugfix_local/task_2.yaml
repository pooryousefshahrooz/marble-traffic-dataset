  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# GH103_redis-py_3998: Fixing\
    \ security concern in __repr__ methods for ConnectionPools - passwords might leak\
    \ in plain text logs — Full Specification (Planner Only)\n\n## Source\n- PR: https://github.com/redis/redis-py/pull/3998\n\
    - Issue: https://github.com/redis/redis-py/issues/3993\n- Repo: https://github.com/redis/redis-py\n\
    \n## Issue Description\n\n## Security Vulnerability Report\n\n**Severity**: MEDIUM\
    \ (CVSS 5.5)\n**CWE**: CWE-532 — Insertion of Sensitive Information into Log File\n\
    **CVSS Vector**: CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N\n**Reporter**: Conner\
    \ Webber (conner.webber000@gmail.com)\n**90-day disclosure deadline**: 2026-06-06\n\
    \n> **Note**: I attempted to file this via GitHub's Private Vulnerability Reporting\
    \ (PVRA), but it is not enabled on this repository. I also checked for a SECURITY.md\
    \ — none exists for redis-py. The main redis/redis SECURITY.md points to redis@redis.io\
    \ which I am also contacting. Filing here so the maintainers are aware.\n\n##\
    \ Summary\n\n`ConnectionPool.__repr__()` in `redis/connection.py` (lines 2848-2854)\
    \ iterates over **all** `connection_kwargs` and includes them in the string representation\
    \ — including `password`.\n\nWhen a Redis connection is created with a password\
    \ (via URL or explicit `password=` parameter), the password is stored in `connection_kwargs['password']`.\
    \ Any code path that triggers `repr()` on a `ConnectionPool` instance will expose\
    \ the Redis password in plaintext.\n\nThe `Connection` class itself is **not affected**\
    \ — its `repr_pieces()` method (lines 1465-1469) deliberately excludes the password\
    \ field. `ConnectionPool.__repr__` was missed when that mitigation was added.\n\
    \n## Affected Code\n\n```python\n# redis/connection.py:2848-2854\ndef __repr__(self)\
    \ -> str:\n    conn_kwargs = \",\".join([f\"{k}={v}\" for k, v in self.connection_kwargs.items()])\n\
    \    return (...)\n```\n\n## Steps to Reproduce\n\n```python\nimport redis\nimport\
    \ logging\n\nlogging.basicConfig(level=logging.DEBUG)\n\npool = redis.ConnectionPool.from_url('redis://:MySecretPassword@localhost:6379/0')\n\
    print(repr(pool))  # Password visible in output\nlogging.debug('Pool state: %r',\
    \ pool)  # Password written to log file\n```\n\n## Impact\n\nRedis passwords are\
    \ exposed in:\n- Application log files (any framework that logs connection objects)\n\
    - Error tracking services (Sentry, Datadog, etc.)\n- Debugger output\n- Tracebacks\
    \ printed to stderr\n- Monitoring dashboards\n\nThis is especially impactful in\
    \ cloud/containerized environments where logs are aggregated and accessible to\
    \ operations teams who should not have database credentials.\n\n## Suggested Fix\n\
    \nFilter sensitive keys from `connection_kwargs` in `__repr__`, consistent with\
    \ how `Connection.repr_pieces()` already handles it:\n\n```python\ndef __repr__(self)\
    \ -> str:\n    SENSITIVE_KEYS = {'password', 'credential_provider'}\n    conn_kwargs\
    \ = \",\".join(\n        [f\"{k}={'***' if k in SENSITIVE_KEYS else v}\"\n   \
    \      for k, v in self.connection_kwargs.items()]\n    )\n    return (...)\n\
    ```\n\n## Affected Versions\n\nAll current versions of redis-py that include `ConnectionPool.__repr__`.\n\
    \n## Issue Discussion (Root Cause Analysis)\n\n### Comment 1 (@spartan8806):\n\
    \nHey — apologies for the confusion here. We accidentally posted a reply meant\
    \ for a different thread and then closed this one by mistake trying to clean it\
    \ up. The actual report is still valid though. Sorry about the mess!\n\n## PR\
    \ Review Comments\n\n**@cursor[bot]** on `redis/connection.py`:\n\n### Duplicated\
    \ sensitive keys list may diverge across files\n\n**Medium Severity**\n\n<!--\
    \ DESCRIPTION START -->\n`SENSITIVE_REPR_KEYS` is independently defined with identical\
    \ contents in both the sync `ConnectionPool` (`redis/connection.py`) and the async\
    \ `ConnectionPool` (`redis/asyncio/connection.py`). If a new sensitive key (e.g.,\
    \ `token`) is added to one but not the other, credentials would silently leak\
    \ in the forgotten pool's `__repr__`. A shared constant would eliminate this risk.\n\
    <!-- DESCRIPTION END -->\n\n<!-- BUGBOT_BUG_ID: a4490fe7-a623-4243-80a9-11950f5e5e0e\
    \ -->\n\n<!-- LOCATIONS START\nredis/connection.py#L2879-L2887\nredis/asyncio/connection.py#L1311-L1319\n\
    LOCATIONS END -->\n<details>\n<summary>Additional Locations (1)</summary>\n\n\
