  llm: ollama/llama3.2:3b
  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# Specification: GH7 Fixture\
    \ Scope Leak\n\n## Issue\n\n`@fixture(scope=\"session\")` returning a mutable\
    \ object (e.g., `[]` or `{}`) leaks\nmutations between test modules. Module A\
    \ appends to the list; Module B sees the\nappended items. This mirrors a real\
    \ pytest fixture isolation issue.\n\n## Root Cause\n\nIn `FixtureManager.get_fixture(name,\
    \ scope_key)`, session-scoped fixtures are cached\nby fixture name only. When\
    \ the fixture factory returns a mutable object, the **same\nobject reference**\
    \ is returned to every requestor across all modules. The cache stores\n`{name:\
    \ value}` but should either:\n\n1. Store the factory and re-invoke it per module-scope\
    \ request, OR\n2. Return `copy.deepcopy(cached_value)` for each call while keeping\
    \ the canonical\n   copy in the cache.\n\nOption 2 (deep-copy on return) is the\
    \ minimal fix because it requires changing only\nthe return path inside `get_fixture()`.\n\
    \n## The Fix\n\nIn `get_fixture()`, after retrieving a cached session-scoped value,\
    \ return a deep copy\nof that value rather than the cached reference directly:\n\
    \n```python\nimport copy\n# inside get_fixture, when serving a cached session\
    \ fixture:\nreturn copy.deepcopy(self._cache[\"session\"][name])\n```\n\nThe canonical\
    \ cached value is never mutated by callers, so subsequent calls always\ndeep-copy\
    \ from the original.\n\n## Constraints\n\n- **Function-scoped fixtures already\
    \ work correctly** (re-invoked per test via\n  `clear_scope(\"function\")`). Do\
    \ not change this behavior.\n- **Module-scoped fixtures already work correctly**\
    \ (cleared between modules via\n  `clear_scope(\"module\")`). Do not change this\
    \ behavior.\n- **Session-scoped fixtures with immutable values** (strings, ints,\
    \ tuples) must\n  still be cached efficiently. `copy.deepcopy` is safe and correct\
    \ for these types;\n  it returns equal values and the factory is still called\
    \ only once.\n- **The test discovery and test runner logic are correct** and must\
    \ not be changed.\n- **`FixtureManager` class must remain present** with its public\
    \ interface intact.\n\n## Affected Files\n\nOnly `test_framework.py` needs to\
    \ be modified. The change is approximately 1–3 lines\ninside `FixtureManager.get_fixture()`."
