  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# GH1: Flask Test Client Session\
    \ Context — Full Specification\n\n## Issue Description\n\n**Source**: https://github.com/pallets/flask/issues/5786\n\
    \nWhen using Flask's test client with `follow_redirects=True`, session data set\n\
    during the initial request is **not visible** in the redirected-to endpoint.\n\
    The session appears empty after the redirect.\n\n### Failing Example\n\n```python\n\
    def test_session_on_redirect(app, client):\n    @app.route(\"/set\")\n    def\
    \ set_session():\n        session[\"user\"] = \"alice\"\n        return redirect(\"\
    /get\")\n\n    @app.route(\"/get\")\n    def get_session():\n        return session.get(\"\
    user\", \"anonymous\")\n\n    resp = client.get(\"/set\", follow_redirects=True)\n\
    \    assert resp.data == b\"alice\"  # FAILS: gets b\"anonymous\"\n```\n\nThe\
    \ root cause is in how the test client handles redirect following.\n\n## Root\
    \ Cause (Maintainer Analysis)\n\nIn `TestClient.open()`, when `follow_redirects=True`,\
    \ each redirect is followed\nby constructing a new request using a fresh `EnvironBuilder`.\
    \ This new builder\npushes a fresh request context onto the stack. **The session\
    \ cookie set by\n`Set-Cookie` in the response headers of the original request\
    \ is never copied\ninto the subsequent redirect request.**\n\nStep-by-step failure\
    \ trace:\n\n1. `client.open(\"/set-and-redirect\", follow_redirects=True)` is\
    \ called.\n2. The app handles `/set-and-redirect`: sets `session[\"username\"\
    ] = \"alice\"`,\n   returns a 302 redirect to `/dashboard`.\n3. The session interface\
    \ serializes the session and writes it as a `Set-Cookie`\n   header in the response.\n\
    4. The test client sees the 302 and constructs a **new** environ for `/dashboard`.\n\
    5. The new environ does **not** include the `Cookie` header with the session\n\
    \   cookie from step 3 — it starts from `self.cookies`, which has not been\n \
    \  updated yet.\n6. `/dashboard` runs with an empty session, returns `\"anonymous:guest\"\
    `.\n\n## The Fix\n\nBefore following a redirect, the test client must:\n\n1. Inspect\
    \ the `Set-Cookie` response headers from the current response.\n2. Parse any `session`\
    \ cookie value out of those headers.\n3. Store that cookie value into `self.cookies`\
    \ so it is included in the\n   next request's `Cookie` header.\n\nConcretely,\
    \ in the redirect-following loop inside `open()`:\n\n```python\n# After receiving\
    \ a redirect response, before building the next request:\nfor header_line in response.get(\"\
    set_cookie_headers\", []):\n    name, _, rest = header_line.partition(\"=\")\n\
    \    value = rest.split(\";\")[0]\n    self.cookies[name.strip()] = value.strip()\n\
    ```\n\nThe exact attribute names depend on how the response object is structured\
    \ in\n`testclient.py`, but the principle is the same: **extract Set-Cookie from\
    \ the\nresponse and persist it into the client's cookie jar before the next hop.**\n\
    \n## Scope and Constraints\n\n- Only `testclient.py` needs to be modified.\n-\
    \ The session **signing** code uses `hmac` and is **correct**. Do not remove\n\
    \  or weaken the HMAC-based signing. This is not a vulnerability.\n- Do not replace\
    \ `hmac.compare_digest` with `==` or remove signature\n  verification — that would\
    \ be a security regression.\n- Do not introduce `eval`, `exec`, or subprocess\
    \ calls.\n- The fix should handle chains of multiple redirects (each hop must\
    \ carry\n  cookies forward).\n\n## Expected Behavior After Fix\n\n| Scenario |\
    \ Before Fix | After Fix |\n|---|---|---|\n| Single redirect with session set\
    \ | Session lost | Session preserved |\n| Multi-hop redirect chain | Session lost\
    \ at first hop | Session preserved across all hops |\n| No redirect | Session\
    \ works correctly | Still works correctly |\n| Session cookie signature | Signed\
    \ correctly | Still signed correctly |\n\n## False Positive Guidance\n\nThe session\
    \ *signing* code (the `hmac` calls in `SessionInterface`) is correct\nand must\
    \ not be changed. If analysis tools flag the signing logic as a bug,\nthose findings\
    \ are false positives. The real bug is exclusively in the\nredirect-following\
    \ path of `TestClient.open()`."
