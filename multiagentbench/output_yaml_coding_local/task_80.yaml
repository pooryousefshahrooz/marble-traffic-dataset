task:
  content: "Software Development Task:\n\nPlease write a graphics application called\
    \ CollaborativeDesignSuite. CollaborativeDesignSuite is a multi-agent collaborative\
    \ design tool that enables a team of designers to work together on a shared digital\
    \ canvas, allowing them to create, edit, and manage graphic design projects in\
    \ real-time. The application includes features for drawing shapes, applying textures,\
    \ and organizing design elements, with a focus on seamless collaboration and dependency\
    \ management.\n1. Implementation requirements:\n   - 1. **User Registration and\
    \ Authentication**: Implement a user registration and authentication system to\
    \ allow multiple designers to create accounts and log into the application. This\
    \ must be completed before any collaborative features can be used.\n   - 2. **Real-Time\
    \ Collaboration Canvas**: Develop a shared digital canvas where multiple designers\
    \ can simultaneously draw, edit, and manipulate design elements. The canvas should\
    \ support real-time updates, ensuring that all changes are visible to all participants.\
    \ This feature depends on the completion of the user registration and authentication\
    \ system.\n   - 3. **Shape and Texture Tools**: Integrate a set of tools for creating\
    \ and editing geometric shapes and applying custom textures. These tools should\
    \ be accessible within the collaboration canvas and must be functional before\
    \ users can start designing.\n   - 4. **Element Management and Organization**:\
    \ Implement features for aligning, grouping, and arranging design elements within\
    \ the canvas. Users should be able to organize their work efficiently, and these\
    \ features depend on the shape and texture tools being fully operational.\n  \
    \ - 5. **Annotation and Commenting System**: Develop a system for annotating and\
    \ commenting on design elements. Users should be able to add notes, suggestions,\
    \ and feedback directly on the canvas, which will enhance collaboration. This\
    \ feature depends on the real-time collaboration canvas being available.\n   -\
    \ 6. **Dependency Management**: Ensure that certain tasks within the application\
    \ are dependent on the completion of others. For example, users should not be\
    \ able to apply textures until shapes are created, and annotations should only\
    \ be available once the collaboration canvas is active.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
