task:
  content: "Software Development Task:\n\nPlease write a software application called\
    \ HealthTeamSync that facilitates collaborative health and fitness management\
    \ among a group of users. HealthTeamSync is a platform that enables users to form\
    \ teams, set shared health and fitness goals, and track individual and team progress.\
    \ The app provides features for setting personal and team challenges, sharing\
    \ progress updates, and communicating within the team to stay motivated and achieve\
    \ collective health and fitness objectives.\n1. Implementation requirements:\n\
    \   - The application should allow users to create and join teams, with each team\
    \ having a unique name and description.\n   - Users should be able to set personal\
    \ and team health and fitness goals, such as weight loss, muscle gain, or endurance\
    \ improvement. Goals should include a target value and a deadline.\n   - The application\
    \ should provide a feature for creating and managing personal and team challenges.\
    \ Challenges should include a title, description, start and end dates, and specific\
    \ activities or exercises.\n   - Users should be able to log their daily activities\
    \ and progress, which should be visible to other team members. The app should\
    \ support logging of various metrics such as weight, distance, time, and calories\
    \ burned.\n   - The application should include a communication feature that allows\
    \ team members to send messages, share tips, and provide encouragement to one\
    \ another.\n   - The application should generate notifications and reminders to\
    \ keep users engaged and on track with their goals and challenges.\n   - The application\
    \ should provide a dashboard that displays team progress, individual contributions,\
    \ and overall performance metrics.\n   - Comprehensive test cases should be provided\
    \ to validate the functionality of the application. Test cases should include\
    \ scenarios for creating and joining teams, setting and tracking goals, logging\
    \ activities, and using the communication features. Edge cases, such as invalid\
    \ input and boundary conditions, should also be validated.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
