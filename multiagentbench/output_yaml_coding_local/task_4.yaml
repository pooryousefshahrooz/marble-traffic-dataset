task:
  content: "Software Development Task:\n\nPlease write a program called PriceTrackerCollaborator\
    \ that enables multiple users to collaboratively track and manage price alerts\
    \ for products they are interested in purchasing. PriceTrackerCollaborator is\
    \ a web-based application that allows users to set price thresholds for specific\
    \ products, receive notifications when prices drop, and share these alerts with\
    \ other users in a group or community setting. The application also provides insights\
    \ on the best time to make a purchase and allows users to compare prices across\
    \ different online retailers.\n1. Implementation requirements:\n   - The application\
    \ should allow users to register and log in using their email and a password.\n\
    \   - Users should be able to create a group or join existing groups to share\
    \ price alerts with other users.\n   - Each user should be able to add products\
    \ to their watchlist by entering the product URL or by searching for the product\
    \ within the application.\n   - For each product, users should be able to set\
    \ a price threshold and receive notifications when the price drops below this\
    \ threshold.\n   - The application should provide real-time price updates for\
    \ the products in the watchlist and notify users via email or in-app notifications.\n\
    \   - Users should be able to share price alerts within their group, and group\
    \ members should receive notifications about the shared alerts.\n   - The application\
    \ should have a feature to compare prices across different online retailers for\
    \ the same product.\n   - The application should provide insights on historical\
    \ price trends and suggest the best time to make a purchase.\n   - Comprehensive\
    \ test cases should be defined, including input scenarios such as adding a product,\
    \ setting a price threshold, receiving notifications, sharing alerts, and comparing\
    \ prices.\n   - Test cases should also cover edge cases such as invalid URLs,\
    \ non-existent products, and handling of multiple price thresholds for the same\
    \ product.\n   - The application should handle concurrent access from multiple\
    \ users and ensure data consistency and integrity.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
