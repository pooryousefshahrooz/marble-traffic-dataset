task:
  content: "Software Development Task:\n\nPlease write a collaborative puzzle game\
    \ called MultiAgentMaze. MultiAgentMaze is a multi-player puzzle game that requires\
    \ players to work together to navigate through a complex maze by strategically\
    \ moving blocks and creating paths. The game is designed to enhance teamwork and\
    \ strategic thinking, with each player controlling a different aspect of the game\
    \ environment.\n1. Implementation requirements:\n   - The game should support\
    \ multiple players, each with a unique role (e.g., pathfinder, blocker, swapper).\n\
    \   - The frontend should provide a real-time, interactive interface where players\
    \ can see the maze, their roles, and the actions of other players.\n   - The backend\
    \ should manage the game state, including the positions of the blocks, the current\
    \ paths, and the actions taken by each player.\n   - The game should include a\
    \ database to store player profiles, game history, and performance metrics.\n\
    \   - Communication between the frontend and backend should be seamless, with\
    \ real-time updates to reflect player actions and changes in the game state.\n\
    \   - The game should include multiple levels with increasing difficulty, introducing\
    \ new challenges and obstacles.\n   - Players should be able to earn points and\
    \ bonuses for successful collaboration and strategic play.\n   - The game should\
    \ provide feedback and hints to players to encourage effective teamwork and problem-solving.\n\
    \n\n2. Project structure:\n   - solution.py (main implementation)\n\n3. Development\
    \ process:\n   - Developer: Create the code.\n   - Developer: Revise the code.\n\
    \   - Developer: Optimize the code.\n\nIf there are multiple files, please put\
    \ them all in solution.py, but remember to add the file name in the following\
    \ format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
