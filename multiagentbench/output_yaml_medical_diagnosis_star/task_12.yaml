task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 20-year-old man comes to the physician because of worsening gait unsteadiness
    and bilateral hearing loss for 1 month. He has had intermittent tingling sensations
    on both cheeks over this time period. He has no history of serious medical illness
    and takes no medications. Audiometry shows bilateral sensorineural hearing loss.
    Genetic evaluation shows a mutation of a tumor suppressor gene on chromosome 22
    that encodes merlin. This patient is at increased risk for which of the following
    conditions?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
