task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 39-year-old man presents to the emergency department because of progressively
    worsening chest pain and nausea that started at a local bar 30 minutes prior.
    The pain radiates to the epigastric area. He has a 5-year history of untreated
    hypertension. He has smoked 1 pack of cigarettes daily for the past 5 years and
    started abusing cocaine 2 weeks before his emergency room visit. The patient is
    diaphoretic and in marked distress. What should be the first step in management?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
