task:
  content: '

    A legal review team is examining the following real contract clause:


    **Clause**


    This short statement indicates that the individual named in the statement is consenting
    to the collection, use, and storage of their biometric information in accordance
    with the Illinois Biometric Information Privacy Act. The statement serves as a
    notice to others that the individual has agreed to the terms of the act, and that
    any use of their biometric information must comply with the requirements of the
    act.


    Each reviewer will assess the clause from their own area of expertise.

    Discuss what risks or compliance issues (if any) the clause raises, share

    findings with the team, and converge on an overall risk assessment.

    '
  output_format: 'Respond in this format:

    **[Area]**

    Which compliance/risk area you are assessing this turn.


    **[Assessment]**

    Your finding: does the clause raise any issue in this area, and why.

    '
