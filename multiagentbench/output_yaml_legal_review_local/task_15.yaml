task:
  content: '

    A legal review team is examining the following real contract clause:


    **Clause**


    The Company shall implement and maintain commercially reasonable security measures
    to protect personal information from inadvertent disclosure. In the event of an
    inadvertent disclosure of personal information, the Company shall conduct a thorough
    investigation to determine the cause of the disclosure and to identify any vulnerabilities
    in its security measures. The Company shall take appropriate corrective action
    to address any identified vulnerabilities.


    Each reviewer will assess the clause from their own area of expertise.

    Discuss what risks or compliance issues (if any) the clause raises, share

    findings with the team, and converge on an overall risk assessment.

    '
  output_format: 'Respond in this format:

    **[Area]**

    Which compliance/risk area you are assessing this turn.


    **[Assessment]**

    Your finding: does the clause raise any issue in this area, and why.

    '
