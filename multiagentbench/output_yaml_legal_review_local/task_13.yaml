task:
  content: '

    A legal review team is examining the following real contract clause:


    **Clause**


    The Indemnifying Party hereby agrees to indemnify, defend, and hold harmless the
    Indemnified Party, its officers, directors, employees, and agents from and against
    any and all claims, damages, liabilities, costs, and expenses (including reasonable
    attorneys'' fees and costs) arising from or relating to any breach of this Agreement
    by the Indemnifying Party, its agents, or its employees, or from any negligent
    or willful act or omission of the Indemnifying Party, its agents, or its employees,
    in connection with the performance of this Agreement.


    Each reviewer will assess the clause from their own area of expertise.

    Discuss what risks or compliance issues (if any) the clause raises, share

    findings with the team, and converge on an overall risk assessment.

    '
  output_format: 'Respond in this format:

    **[Area]**

    Which compliance/risk area you are assessing this turn.


    **[Assessment]**

    Your finding: does the clause raise any issue in this area, and why.

    '
