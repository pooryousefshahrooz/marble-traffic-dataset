task:
  content: "Software Development Task:\n\nPlease write a strategy game system called\
    \ 'EmpireForge' that allows multiple AI agents to collaborate and compete in building\
    \ and managing empires across various terrains and historical periods. EmpireForge\
    \ is a multi-agent strategy game system that simulates the complexities of ancient\
    \ and modern warfare, resource management, and diplomatic negotiations, requiring\
    \ agents to coordinate their actions to achieve strategic objectives and outmaneuver\
    \ opponents.\n1. Implementation requirements:\n   - The frontend should provide\
    \ a dynamic and interactive map interface, allowing players to view and interact\
    \ with the game world, including placing units, managing resources, and engaging\
    \ in diplomatic actions. The frontend must support real-time updates and smooth\
    \ animations to enhance the user experience.\n   - The backend should handle the\
    \ game logic, including turn-based actions, resource calculations, combat resolution,\
    \ and AI decision-making. It must support multiple agents, each running its own\
    \ strategy and making decisions based on the game state. The backend should also\
    \ manage game state persistence and ensure that all agents have access to the\
    \ latest information.\n   - The database should store all game data, including\
    \ player information, game state, historical records, and resource inventories.\
    \ It should support efficient querying and updating to ensure that the game runs\
    \ smoothly, even with multiple agents and large datasets. The database should\
    \ also support rollback and replay functionalities for debugging and analysis.\n\
    \n\n2. Project structure:\n   - solution.py (main implementation)\n\n3. Development\
    \ process:\n   - Developer: Create the code.\n   - Developer: Revise the code.\n\
    \   - Developer: Optimize the code.\n\nIf there are multiple files, please put\
    \ them all in solution.py, but remember to add the file name in the following\
    \ format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
