task:
  content: "Software Development Task:\n\nPlease write a program called VideoCollaborationSuite.\
    \ VideoCollaborationSuite is a collaborative video editing application that allows\
    \ multiple users to work together on a video project in real-time. It provides\
    \ tools for trimming, synchronizing subtitles, and adjusting playback speed, and\
    \ supports real-time communication and feedback among team members.\n1. Implementation\
    \ requirements:\n   - The application must support multiple users editing a video\
    \ simultaneously, with real-time updates and synchronization of changes.\n   -\
    \ It should include a feature for automatic subtitle synchronization, allowing\
    \ users to upload a video and subtitle file, and automatically align the subtitles\
    \ with the video content. Users should be able to manually adjust the synchronization\
    \ if needed.\n   - The application must provide a playback speed adjustment tool,\
    \ allowing users to change the speed of the video playback for precise editing\
    \ and review.\n   - The system should include a chat feature for real-time communication\
    \ among users, enabling them to discuss and coordinate their editing activities.\n\
    \   - The application should support version control, allowing users to save different\
    \ versions of the video and revert to previous states if necessary.\n   - The\
    \ system should dynamically adapt to user feedback, such as suggestions for subtitle\
    \ adjustments or playback speed changes, and allow for seamless collaboration\
    \ and iterative improvements.\n\n\n2. Project structure:\n   - solution.py (main\
    \ implementation)\n\n3. Development process:\n   - Developer: Create the code.\n\
    \   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\nIf there\
    \ are multiple files, please put them all in solution.py, but remember to add\
    \ the file name in the following format:\n```python\n# file_name_1.py\n# your\
    \ code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n# your\
    \ code here\n```\n\nPlease work together to complete this task following software\
    \ engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
