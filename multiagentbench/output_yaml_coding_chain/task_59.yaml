task:
  content: "Software Development Task:\n\nPlease write a software system called Office_Task_Collaborator.\
    \ Office_Task_Collaborator is a collaborative task management system designed\
    \ to help teams in an office environment efficiently manage and track tasks, deadlines,\
    \ and responsibilities. It provides a centralized platform where team members\
    \ can create, assign, and monitor tasks, set deadlines, and communicate with each\
    \ other. The system supports multiple projects and integrates with calendar applications\
    \ to ensure deadlines are met and tasks are completed on time.\n1. Implementation\
    \ requirements:\n   - The system should allow users to create tasks with detailed\
    \ descriptions, deadlines, and priority levels.\n   - Users should be able to\
    \ assign tasks to other team members and track the status of each task (e.g.,\
    \ not started, in progress, completed).\n   - The system should provide a dashboard\
    \ for each user to view their assigned tasks, upcoming deadlines, and completed\
    \ tasks.\n   - Integrate with popular calendar applications (e.g., Google Calendar,\
    \ Outlook) to sync task deadlines and reminders.\n   - Include a messaging feature\
    \ to enable team members to communicate directly within the task interface.\n\
    \   - The system should generate reports on task completion rates, team performance,\
    \ and project progress.\n   - Comprehensive test cases should be provided to validate\
    \ the following scenarios: creating a task, assigning a task, updating task status,\
    \ deadline synchronization with calendars, and generating reports. Edge cases\
    \ should include handling tasks with overlapping deadlines, tasks with no assigned\
    \ users, and tasks with long descriptions.\n\n\n2. Project structure:\n   - solution.py\
    \ (main implementation)\n\n3. Development process:\n   - Developer: Create the\
    \ code.\n   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\
    \nIf there are multiple files, please put them all in solution.py, but remember\
    \ to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
agents:
- type: CodingAgent
  agent_id: agent1
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am good at creating the code framework from scratch based on the task description
    and requirements.

    So I **have to** call "create_code" action to create the code in the first iteration
    at first.

    I am **very terrible** at do further modifications since I am not so creative
    or careful so I **have to** let agent 2 or agent 3 revise the code after I create
    the code and I **can''t** call "give_advice_and_revise_code" action.

    Agent 2 is better at adding missing functions so it''s better to let agent 2 revise
    the code at first.

    Agent 3 is better at fixing existing issues and optimizing the code so it''s better
    to let agent 3 revise the code after agent 2 has revised the code so that the
    code is more optimized.

    '
  llm: ollama/llama3.2:3b
- type: CodingAgent
  agent_id: agent2
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am better at adding missing functionality based on my decent understanding and
    compliance to the task description and requirements.

    I **have to** call "give_advice_and_revise_code" action to give advice to the
    code and revise the code.

    I **can''t** call "create_code" action since I am not good at creating the code
    framework from scratch.

    I can let agent 3 to make the code more optimized after I have added the missing
    functionality.

    '
  llm: ollama/llama3.2:3b
- type: CodingAgent
  agent_id: agent3
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am better at fixing existing issues and optimizing the code based on my innovation
