task:
  content: "Software Development Task:\n\nPlease write a finance management system\
    \ called BudgetBuddy that integrates savings tracking, expense analysis, and expense\
    \ consolidation into a single platform. BudgetBuddy is a comprehensive financial\
    \ management tool that allows users to track their savings, analyze their expenses,\
    \ and consolidate financial data from multiple sources, providing a holistic view\
    \ of their financial health and offering personalized financial advice.\n1. Implementation\
    \ requirements:\n   - Frontend: Develop a user-friendly interface that allows\
    \ users to input and manage their financial data, visualize their savings and\
    \ expenses through interactive charts and graphs, and receive personalized financial\
    \ advice. The frontend should be responsive and accessible on both desktop and\
    \ mobile devices.\n   - Backend: Implement a robust backend system that securely\
    \ handles user data, including saving, retrieving, and processing financial information\
    \ from various sources. The backend should support real-time data synchronization\
    \ and provide APIs for data exchange with third-party financial services.\n  \
    \ - Database: Design a scalable and secure database schema to store user profiles,\
    \ financial transactions, savings goals, and expense categories. Ensure the database\
    \ supports efficient querying and data retrieval to facilitate real-time updates\
    \ and reporting.\n   - Multi-Agent Collaboration: The system should support collaboration\
    \ between frontend and backend developers to ensure seamless integration of user\
    \ interface components and backend services. Additionally, the system should facilitate\
    \ collaboration between data analysts and financial advisors to provide users\
    \ with accurate and actionable financial advice based on their data.\n\n\n2. Project\
    \ structure:\n   - solution.py (main implementation)\n\n3. Development process:\n\
    \   - Developer: Create the code.\n   - Developer: Revise the code.\n   - Developer:\
    \ Optimize the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
