task:
  content: "Software Development Task:\n\nPlease write a collaborative learning platform\
    \ called Language_Learning_Hub. Language_Learning_Hub is a comprehensive software\
    \ application that integrates language conversation, vocabulary enhancement, and\
    \ grammar correction to provide a holistic learning experience for language learners.\
    \ It connects learners with native speakers, offers interactive vocabulary games,\
    \ and provides grammar correction tools, all within a single platform.\n1. Implementation\
    \ requirements:\n   - Frontend Development: Develop a user-friendly interface\
    \ that supports multiple user roles (learners, native speakers, and administrators).\
    \ The interface should include sections for language exchange conversations, vocabulary\
    \ games, and grammar correction exercises. Implement real-time chat and voice\
    \ communication features for language exchange sessions.\n   - Backend Development:\
    \ Design a robust backend system that manages user accounts, session data, and\
    \ game scores. Implement APIs for real-time data exchange between the frontend\
    \ and backend, ensuring smooth communication and data integrity. Integrate a database\
    \ to store user information, conversation logs, game progress, and grammar correction\
    \ data.\n   - Database Management: Create a scalable database schema to efficiently\
    \ store and manage user data, conversation records, game scores, and grammar correction\
    \ feedback. Ensure data security and privacy compliance. Implement backup and\
    \ recovery mechanisms to protect user data.\n   - Cross-Domain Collaboration:\
    \ Ensure seamless integration and communication between the frontend and backend\
    \ components. Coordinate the development of real-time communication features,\
    \ data synchronization, and user authentication processes. Implement a feedback\
    \ loop where users can report issues or suggest improvements, which can be managed\
    \ through the backend and reflected in the frontend.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
