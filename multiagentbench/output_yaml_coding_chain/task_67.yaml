task:
  content: "Software Development Task:\n\nPlease write a program called 'Event_Organizer_Collaborative'\
    \ that allows multiple agents to collaboratively manage and optimize the planning\
    \ and execution of various events. Event Organizer Collaborative is a management\
    \ game software that enables players to work together to handle event logistics,\
    \ scheduling, budgeting, and guest management. Players can assign tasks, set deadlines,\
    \ communicate with each other, and adjust plans based on real-time feedback and\
    \ changing conditions to ensure the success of each event.\n1. Implementation\
    \ requirements:\n   - The system should allow multiple agents to log in and collaborate\
    \ on event planning, with each agent having distinct roles and responsibilities.\n\
    \   - Agents should be able to create and manage event details, including location,\
    \ date, time, and guest list. The system should provide real-time updates and\
    \ notifications to all agents when changes are made.\n   - The system should include\
    \ a task management feature where agents can assign tasks to each other, set deadlines,\
    \ and track progress. Tasks should be dynamically adjustable based on user feedback\
    \ and changing conditions.\n   - The system should provide a communication platform\
    \ for agents to discuss and coordinate their efforts, including features like\
    \ chat, comments, and file sharing.\n   - The system should support budget management,\
    \ allowing agents to track expenses, set budgets, and receive alerts when costs\
    \ exceed budget limits. Budgets should be adaptable based on user input and real-time\
    \ data.\n   - The system should offer a dashboard that provides an overview of\
    \ all ongoing events, including key metrics such as completion status, budget\
    \ adherence, and guest satisfaction. The dashboard should update in real-time\
    \ and allow agents to drill down into specific details.\n   - The system should\
    \ be able to adapt to user feedback and changing conditions, such as last-minute\
    \ cancellations, venue changes, or unexpected expenses, by allowing agents to\
    \ make quick adjustments to event plans.\n\n\n2. Project structure:\n   - solution.py\
    \ (main implementation)\n\n3. Development process:\n   - Developer: Create the\
    \ code.\n   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\
    \nIf there are multiple files, please put them all in solution.py, but remember\
    \ to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
