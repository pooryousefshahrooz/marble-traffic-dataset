task:
  content: "Software Development Task:\n\nPlease write a multiplayer online battle\
    \ arena (MOBA) game called Galactic Conquest. Galactic Conquest is a MOBA game\
    \ that allows players to team up and engage in strategic battles against AI-controlled\
    \ enemies and other player teams. The game features a variety of customizable\
    \ characters, each with unique abilities, and a dynamic environment that changes\
    \ with each level. The objective is to capture and hold key points on the map\
    \ while defending your own territory.\n1. Implementation requirements:\n   - Develop\
    \ a character creation system that allows players to select and customize their\
    \ characters, including choosing from a set of unique abilities. This system must\
    \ be completed before the game can be tested for balance and player experience.\n\
    \   - Create an AI system that controls enemy characters and manages the behavior\
    \ of AI-controlled teams. This AI system should be designed to adapt to player\
    \ actions and provide a challenging experience. The AI system must be developed\
    \ and tested before integrating it with the multiplayer components.\n   - Implement\
    \ a map system that generates different environments for each level, including\
    \ key points that players must capture and defend. The map system should also\
    \ include features such as destructible environments and power-ups. The map system\
    \ must be functional and tested for gameplay balance before the multiplayer features\
    \ are added.\n   - Design a multiplayer framework that supports team-based gameplay,\
    \ including matchmaking, in-game chat, and real-time synchronization of player\
    \ actions. This framework must be built on top of the character creation, AI,\
    \ and map systems, and must be thoroughly tested for stability and performance.\n\
    \   - Develop a scoring and progression system that tracks player achievements,\
    \ awards points for capturing and holding key points, and provides rewards for\
    \ winning matches. This system should be integrated after the core gameplay features\
    \ are complete and tested.\n   - Create a user interface (UI) that provides players\
    \ with essential information, such as character stats, map layout, and team status.\
    \ The UI must be designed and implemented to enhance the player experience and\
    \ should be the final step in the development process.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
