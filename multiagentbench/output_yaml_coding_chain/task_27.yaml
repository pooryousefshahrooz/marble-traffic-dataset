task:
  content: "Software Development Task:\n\nPlease write a system called Collaborative\
    \ Build Optimizer (CBO) that enhances the build process for software projects\
    \ by integrating code efficiency analysis, task management, and build time estimation.\
    \ Collaborative Build Optimizer is a comprehensive development tool designed to\
    \ optimize the build process by analyzing code efficiency, managing development\
    \ tasks with dependencies, and estimating build times, thereby improving overall\
    \ development productivity and project management.\n1. Implementation requirements:\n\
    \   - Develop a Code Efficiency Analyzer module that evaluates the efficiency\
    \ of code snippets and provides recommendations for optimizing performance based\
    \ on metrics such as time complexity, space complexity, and algorithmic inefficiencies.\
    \ This module must be completed before integrating it into the main system.\n\
    \   - Create a Development Task Tracker module that allows development teams to\
    \ manage and track project tasks, including setting task priorities, due dates,\
    \ and dependencies between tasks. This module must be completed and integrated\
    \ into the main system after the Code Efficiency Analyzer module is ready.\n \
    \  - Implement a Build Time Estimator module that calculates the estimated time\
    \ required to build a software project based on code complexity, number of modules,\
    \ and development team size. This module must be developed and integrated into\
    \ the main system after the Development Task Tracker module is functional.\n \
    \  - Integrate all three modules into a unified system where the Code Efficiency\
    \ Analyzer provides insights that can be used to optimize tasks in the Development\
    \ Task Tracker, and the Build Time Estimator takes into account the optimized\
    \ code and task management to provide more accurate build time estimates.\n  \
    \ - Ensure that the system supports real-time updates and notifications for task\
    \ status, build progress, and efficiency recommendations, enhancing collaboration\
    \ and communication among team members.\n\n\n2. Project structure:\n   - solution.py\
    \ (main implementation)\n\n3. Development process:\n   - Developer: Create the\
    \ code.\n   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\
    \nIf there are multiple files, please put them all in solution.py, but remember\
    \ to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
agents:
- type: CodingAgent
  agent_id: agent1
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am good at creating the code framework from scratch based on the task description
    and requirements.

    So I **have to** call "create_code" action to create the code in the first iteration
    at first.

    I am **very terrible** at do further modifications since I am not so creative
    or careful so I **have to** let agent 2 or agent 3 revise the code after I create
    the code and I **can''t** call "give_advice_and_revise_code" action.

    Agent 2 is better at adding missing functions so it''s better to let agent 2 revise
    the code at first.

    Agent 3 is better at fixing existing issues and optimizing the code so it''s better
    to let agent 3 revise the code after agent 2 has revised the code so that the
    code is more optimized.

    '
  llm: ollama/llama3.2:3b
- type: CodingAgent
  agent_id: agent2
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am better at adding missing functionality based on my decent understanding and
    compliance to the task description and requirements.

    I **have to** call "give_advice_and_revise_code" action to give advice to the
    code and revise the code.

    I **can''t** call "create_code" action since I am not good at creating the code
    framework from scratch.

    I can let agent 3 to make the code more optimized after I have added the missing
    functionality.

    '
  llm: ollama/llama3.2:3b
- type: CodingAgent
  agent_id: agent3
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am better at fixing existing issues and optimizing the code based on my innovation
