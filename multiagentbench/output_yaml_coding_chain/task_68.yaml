task:
  content: "Software Development Task:\n\nPlease write a program called MultiServe\
    \ that facilitates a collaborative food ordering and delivery system for a network\
    \ of restaurants and delivery agents. MultiServe is a software application that\
    \ enables users to order food from multiple restaurants simultaneously, and it\
    \ coordinates the delivery process by assigning tasks to multiple delivery agents\
    \ to ensure efficient and timely delivery.\n1. Implementation requirements:\n\
    \   - Implement a user interface where users can browse menus from multiple restaurants,\
    \ add items to a cart, and place a single order that combines items from different\
    \ restaurants.\n   - Develop a backend system that can handle the coordination\
    \ of orders from multiple restaurants, including sending order details to each\
    \ restaurant and tracking the status of each order.\n   - Create a delivery agent\
    \ interface that allows multiple delivery agents to log in, receive assigned delivery\
    \ tasks, and update the status of their deliveries in real-time.\n   - Design\
    \ a comprehensive set of test cases to validate the functionality of the system,\
    \ including the following scenarios:\n   -  - A user places an order with items\
    \ from two different restaurants, and the system correctly sends the order details\
    \ to both restaurants.\n   -  - The system assigns the delivery tasks to two different\
    \ delivery agents, and both agents receive the correct delivery details.\n   -\
    \  - The system updates the order status in real-time as each delivery agent completes\
    \ their part of the delivery.\n   -  - The system handles edge cases such as a\
    \ restaurant being unavailable, a delivery agent declining a task, or a user canceling\
    \ an order after it has been placed.\n   -  - The system ensures that the user\
    \ receives a notification when the order is ready for pickup or has been delivered.\n\
    \n\n2. Project structure:\n   - solution.py (main implementation)\n\n3. Development\
    \ process:\n   - Developer: Create the code.\n   - Developer: Revise the code.\n\
    \   - Developer: Optimize the code.\n\nIf there are multiple files, please put\
    \ them all in solution.py, but remember to add the file name in the following\
    \ format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
