task:
  content: "Software Development Task:\n\nPlease write a program called MealMaster\
    \ that personalizes meal plans for users based on their dietary preferences, health\
    \ goals, and available ingredients. MealMaster is a personalization software that\
    \ helps users create balanced and tailored meal plans by taking into account their\
    \ specific dietary needs, such as calorie intake, macronutrient ratios, and food\
    \ allergies. It also suggests recipes and provides nutritional information for\
    \ each meal.\n1. Implementation requirements:\n   - The program should allow users\
    \ to input their dietary preferences (e.g., vegetarian, vegan, gluten-free, low-carb).\n\
    \   - The program should enable users to set health goals (e.g., weight loss,\
    \ muscle gain, maintenance) and input their daily calorie intake and macronutrient\
    \ ratios.\n   - The program should allow users to specify any food allergies or\
    \ intolerances.\n   - The program should generate a personalized meal plan for\
    \ the week, including breakfast, lunch, dinner, and snacks, based on the user's\
    \ inputs.\n   - The program should suggest recipes for each meal, including a\
    \ list of ingredients and preparation instructions.\n   - The program should provide\
    \ nutritional information for each meal, including calories, protein, carbohydrates,\
    \ fats, and fiber.\n   - The program should have a feature to save and modify\
    \ meal plans, allowing users to swap out meals or ingredients.\n   - Test cases\
    \ should include scenarios for different dietary preferences, health goals, and\
    \ food allergies.\n   - Test cases should validate the nutritional information\
    \ provided for each meal against standard nutritional databases.\n   - Test cases\
    \ should include edge cases such as users with multiple food allergies and very\
    \ specific health goals.\n\n\n2. Project structure:\n   - solution.py (main implementation)\n\
    \n3. Development process:\n   - Developer: Create the code.\n   - Developer: Revise\
    \ the code.\n   - Developer: Optimize the code.\n\nIf there are multiple files,\
    \ please put them all in solution.py, but remember to add the file name in the\
    \ following format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
