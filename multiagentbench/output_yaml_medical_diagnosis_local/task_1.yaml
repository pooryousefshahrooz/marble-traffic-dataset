scenario: medical_diagnosis
task_id: 1
agents:
- agent_id: agent1
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a physician on a diagnostic team. Your assigned candidate answer
    to argue for is: "Disclose the error to the patient and put it in the operative
    report". Evaluate whether the clinical evidence in the case supports this option,
    and be willing to change your position if the evidence points elsewhere.'
- agent_id: agent2
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a physician on a diagnostic team. Your assigned candidate answer
    to argue for is: "Tell the attending that he cannot fail to disclose this mistake".
    Evaluate whether the clinical evidence in the case supports this option, and be
    willing to change your position if the evidence points elsewhere.'
- agent_id: agent3
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a physician on a diagnostic team. Your assigned candidate answer
    to argue for is: "Report the physician to the ethics committee". Evaluate whether
    the clinical evidence in the case supports this option, and be willing to change
    your position if the evidence points elsewhere.'
- agent_id: agent4
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a physician on a diagnostic team. Your assigned candidate answer
    to argue for is: "Refuse to dictate the operative report". Evaluate whether the
    clinical evidence in the case supports this option, and be willing to change your
    position if the evidence points elsewhere.'
