task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A junior orthopaedic surgery resident is completing a carpal tunnel repair with
    the department chairman as the attending physician. During the case, the resident
    inadvertently cuts a flexor tendon. The tendon is repaired without complication.
    The attending tells the resident that the patient will do fine, and there is no
    need to report this minor complication that will not harm the patient, as he does
    not want to make the patient worry unnecessarily. He tells the resident to leave
    this complication out of the operative report. Which of the following is the correct
    next action for the resident to take?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
