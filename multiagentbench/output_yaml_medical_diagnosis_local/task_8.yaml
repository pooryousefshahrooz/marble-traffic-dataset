task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 65-year-old man is brought to the emergency department 30 minutes after the
    onset of acute chest pain. He has hypertension and asthma. Current medications
    include atorvastatin, lisinopril, and an albuterol inhaler. He appears pale and
    diaphoretic. His pulse is 114/min and blood pressure is 130/88 mm Hg. An ECG shows
    ST-segment depressions in leads II, III, and aVF. Laboratory studies show an increased
    serum troponin T concentration. The patient is treated for acute coronary syndrome
    and undergoes percutaneous transluminal coronary angioplasty. At the time of discharge,
    echocardiography shows a left ventricular ejection fraction of 58%. In addition
    to aspirin, which of the following drugs should be added to this patient''s medication
    regimen?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
