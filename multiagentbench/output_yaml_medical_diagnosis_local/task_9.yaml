task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 37-year-old-woman presents to her primary care physician requesting a new form
    of birth control. She has been utilizing oral contraceptive pills (OCPs) for the
    past 8 years, but asks to switch to an intrauterine device (IUD). Her vital signs
    are: blood pressure 118/78 mm Hg, pulse 73/min and respiratory rate 16/min. She
    is afebrile. Physical examination is within normal limits. Which of the following
    past medical history statements would make copper IUD placement contraindicated
    in this patient?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
