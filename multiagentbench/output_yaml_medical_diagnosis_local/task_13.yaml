task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 47-year-old executive schedules an appointment his physician for a routine medical
    check-up. He currently has no complaints and claims to be “as fit as a fiddle.”
    The physical examination findings are unremarkable, except for a mid-systolic
    murmur heard in the 2nd left intercostal space that radiates to the carotids on
    auscultation. The physician instructs the patient to stand from a supine position
    with the stethoscope still placed on his chest. Which of the following changes
    would occur with this maneuver?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
