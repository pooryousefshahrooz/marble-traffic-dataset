task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 35-year-old man comes to the physician because of itchy, watery eyes for the
    past week. He has also been sneezing multiple times a day during this period.
    He had a similar episode 1 year ago around springtime. He has iron deficiency
    anemia and ankylosing spondylitis. Current medications include ferrous sulfate,
    artificial tear drops, and indomethacin. He works as an elementary school teacher.
    His vital signs are within normal limits. Visual acuity is 20/20 without correction.
    Physical examination shows bilateral conjunctival injection with watery discharge.
    The pupils are 3 mm, equal, and reactive to light. Examination of the anterior
    chamber of the eye is unremarkable. Which of the following is the most appropriate
    treatment?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
