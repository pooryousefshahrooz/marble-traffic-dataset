task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 68-year-old male comes to the physician for evaluation of right flank pain.
    He has a history of diabetes and peripheral artery disease. His blood pressure
    is 160/90 mm Hg. Physical examination shows abdominal tenderness and right flank
    tenderness. An ultrasound shows dilation of the right ureter and renal pelvis.
    Which of the following is the most likely underlying cause of this patient''s
    condition?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
