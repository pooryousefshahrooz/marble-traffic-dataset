task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A 59-year-old overweight woman presents to the urgent care clinic with the complaint
    of severe abdominal pain for the past 2 hours. She also complains of a dull pain
    in her back with nausea and vomiting several times. Her pain has no relation with
    food. Her past medical history is significant for recurrent abdominal pain due
    to cholelithiasis. Her father died at the age of 60 with some form of abdominal
    cancer. Her temperature is 37°C (98.6°F), respirations are 15/min, pulse is 67/min,
    and blood pressure is 122/98 mm Hg. Physical exam is unremarkable. However, a
    CT scan of the abdomen shows a calcified mass near her gallbladder. Which of the
    following diagnoses should be excluded first in this patient?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
