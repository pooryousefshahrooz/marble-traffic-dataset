task:
  content: '

    A team of physicians is evaluating the following real clinical case:


    **Case**


    A microbiologist is studying the emergence of a virulent strain of the virus.
    After a detailed study of the virus and its life cycle, he proposes a theory:
    Initially, a host cell is co-infected with 2 viruses from the same virus family.
    Within the host cell, concomitant production of various genome segments from both
    viruses occurs. Ultimately, the different genome segments from the viruses are
    packaged into a unique and novel virus particle. The newly formed virus particle
    is both stable and viable and is a new strain from the virus family that caused
    the outbreak of infection. Which of the following viruses is capable of undergoing
    the above-mentioned process?


    Each physician on the team will argue for a different candidate answer.

    Discuss the evidence for and against each option, challenge each other''s

    reasoning, and converge on the single best-supported answer.

    '
  output_format: 'Respond in this format:

    **[Your Position]**

    Which option you are arguing for or evaluating this turn.


    **[Clinical Reasoning]**

    The evidence from the case that supports or refutes this option.

    '
