  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# GH141_urllib3_3736: Fix\
    \ `HTTPResponse.read_chunked` when leftover data is present in decoder's buffer\
    \ — Full Specification (Planner Only)\n\n## Source\n- PR: https://github.com/urllib3/urllib3/pull/3736\n\
    - Issue: https://github.com/urllib3/urllib3/issues/3734\n- Repo: https://github.com/urllib3/urllib3\n\
    \n## Issue Description\n\n### Subject\n\nWhen receiving a large brotli-compressed\
    \ response with chunked transfer encoding, urllib3 2.6.x raises a `DecodeError`\
    \ with the message:\n\n```\nbrotli: decoder process called with data when 'can_accept_more_data()'\
    \ is False\n```\n\nThis appears to be a regression introduced in urllib3 2.6.0,\
    \ likely related to the security changes for handling compressed content (GHSA-2xpw-w6gg-jr37).\
    \ The issue occurs specifically when:\n1. The response uses `Content-Encoding:\
    \ br` (brotli)\n2. The response uses `Transfer-Encoding: chunked`\n3. The compressed\
    \ data is moderately large (~500KB+ compressed)\n4. Data arrives in small TCP\
    \ segments\n\nThe issue does **not** occur with urllib3 2.5.0.\n\n### Environment\n\
    \n```\nOS: Linux 6.x (Debian Bookworm in Docker)\nPython: 3.12.12\nOpenSSL: OpenSSL\
    \ 3.0.x\nurllib3: 2.6.1\nbrotli: 1.2.0\nrequests: 2.31.0\n```\n\nWorks correctly\
    \ with:\n```\nurllib3: 2.5.0\nbrotli: 1.1.0\n```\n\n### Steps to Reproduce\n\n\
    Minimal reproduction script:\n\n```python\n#!/usr/bin/env python3\n\"\"\"Minimal\
    \ reproduction: brotli decode bug with urllib3 2.6.x + brotli 1.2.0\"\"\"\n\n\
    import hashlib\nimport socket\nimport threading\n\nimport brotli\nimport requests\n\
    \ndef main() -> int:\n    from importlib.metadata import version\n\n    print(f\"\
    urllib3: {version('urllib3')}, brotli: {version('brotli')}\")\n\n    # Generate\
    \ ~15MB data with moderate compressibility (~27x ratio)\n    data = b\"\".join(\n\
    \        f\"{hashlib.sha256(str(i).encode()).hexdigest()}{'a' * 900}{i:06d}\\\
    n\".encode()\n        for i in range(15000)\n    )\n    compressed = brotli.compress(data)\n\
    \    print(f\"Data: {len(data):,} -> {len(compressed):,} bytes ({len(data) //\
    \ len(compressed)}x)\")\n\n    # Build chunked HTTP response\n    resp = b\"HTTP/1.1\
    \ 200 OK\\r\\nContent-Encoding: br\\r\\nTransfer-Encoding: chunked\\r\\n\\r\\\
    n\"\n    for i in range(0, len(compressed), 32768):\n        chunk = compressed[i\
    \ : i + 32768]\n        resp += f\"{len(chunk):x}\\r\\n\".encode() + chunk + b\"\
    \\r\\n\"\n    resp += b\"0\\r\\n\\r\\n\"\n\n    # Start mock server\n    ready\
    \ = threading.Event()\n\n    def serve(port: int) -> None:\n        s = socket.socket()\n\
    \        s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n        s.bind((\"\
    127.0.0.1\", port))\n        s.listen(1)\n        ready.set()\n        c, _ =\
    \ s.accept()\n        c.recv(4096)\n        for i in range(0, len(resp), 128):\
    \  # Small chunks trigger bug\n            c.send(resp[i : i + 128])\n       \
    \ c.close()\n        s.close()\n\n    threading.Thread(target=serve, args=(18765,),\
    \ daemon=True).start()\n    ready.wait()\n\n    try:\n        r = requests.get(\"\
    http://127.0.0.1:18765/\", timeout=60)\n        print(f\"SUCCESS: {len(r.content):,}\
    \ bytes\")\n        return 0\n    except requests.exceptions.ContentDecodingError\
    \ as e:\n        print(f\"FAILED: {e}\")\n        return 1\n\nif __name__ == \"\
    __main__\":\n    exit(main())\n```\n\n### Expected Behavior\n\nThe response should\
    \ be successfully decompressed and returned:\n\n```\nurllib3: 2.5.0, brotli: 1.1.0\n\
    Data: 14,565,000 -> 549,724 bytes (26x)\nSUCCESS: 14,565,000 bytes\n```\n\n###\
    \ Actual Behavior\n\nWith urllib3 2.6.x, the request fails with a `ContentDecodingError`:\n\
    \n```\nurllib3: 2.6.1, brotli: 1.2.0\nData: 14,565,000 -> 549,724 bytes (26x)\n\
    FAILED: ('Received response with content-encoding: br, but failed to decode it.',\
    \ \n         error(\"brotli: decoder process called with data when 'can_accept_more_data()'\
    \ is False\"))\n```\n\nFull traceback:\n```\nurllib3.exceptions.DecodeError: ('Received\
    \ response with content-encoding: br, but \nfailed to decode it.', error(\"brotli:\
    \ decoder process called with data when \n'can_accept_more_data()' is False\"\
    ))\n```\n\nThe error suggests that the brotli decoder signals completion (`can_accept_more_data()`\
    \ returns `False`) but urllib3 continues trying to feed it more compressed data\
    \ from the chunked stream.\n\n## Issue Discussion (Root Cause Analysis)\n\n###\
    \ Comment 1 (@hanamurayuki):\n\nsame here\n\n### Comment 2 (@Cycloctane):\n\n\
    [Code changes omitted — Planner should analyze the issue and guide the Executor]\n\
    \n### Comment 3 (@illia-v):\n\nPlease check if #3736 fixes your issue. Thanks\
    \ for the reproducer, it doesn't fail with the fix.\n\n### Comment 4 (@illia-v):\n\
    \n@Cycloctane that's the same logic as in my fix, thanks \U0001F44D\U0001F3FB\n\
    I reused your approach to simplify #3736.\n\n### Comment 5 (@corsac-s):\n\nSo\
    \ for what it's worth I'm experiencing this on Debian sid with:\n\n```\nii python3-urllib3\
    \                              2.5.0-1\nii  libbrotli-dev:amd64              \
    \            1.1.0-2+b9      \nii  libbrotli1:amd64                          \
    \   1.1.0-2+b9      \nii  python3-brotli                               1.1.0-2+b9\
    \   \nii  python3-brotlicffi                           1.2.0.0+ds-1+b1 \n```\n\
    \nSo it might be more related to the brotli update than an urllib update. Unfortunately\
    \ I don't seem to be able to apply the patch in #3736 to 2.5.0 so I might have\
    \ to wait until Debian updates urllib (or maybe switch to a venv at least temporarily)\n\
    \n### Comment 6 (@kesara):\n\nIndeed this seems to be an error related to brotli\
    \ 1.2.0 update.\n\nSample code results from the original issue:\nWith brotli 1.1.0:\n\
    ```\nurllib3: 2.6.1, brotli: 1.1.0\nData: 14,565,000 -> 549,724 bytes (26x)\n\
    SUCCESS: 14,565,000 bytes\n```\n\nWith brotli 1.2.0:\n```\nurllib3: 2.6.1, brotli:\
    \ 1.2.0\nData: 14,565,000 -> 549,724 bytes (26x)\nException in thread Thread-1\
    \ (serve):\nFAILED: ('Received response with content-encoding: br, but failed\
    \ to decode it.', error(\"brotli: decoder process called with data when 'can_accept_more_data()'\
    \ is False\"))\nTraceback (most recent call last):\n  File \"/opt/homebrew/Cellar/python@3.12/3.12.12/Frameworks/Python.framework/Versions/3.12/lib/python3.12/threading.py\"\
    , line 1075, in _bootstrap_inner\n```\n\n### Comment 7 (@aborigeth):\n\n> Please\
    \ check if [#3736](https://github.com/urllib3/urllib3/pull/3736) fixes your issue.\
    \ Thanks for the reproducer, it doesn't fail with the fix.\n\nSo far, fix works\
    \ for me.\n\n### Comment 8 (@illia-v):\n\nThe fix was released in [v2.6.2](https://github.com/urllib3/urllib3/releases/tag/2.6.2).\n\
    \n### Comment 9 (@zanllan24-spec):\n\nMy until el aporte gracias por em apoyo\
    \ y las cknfirmaciones.\n\n## Files Changed in Fix\n\n- `changelog/3734.bugfix.rst`\
    \ (added, +2/-0)\n- `src/urllib3/response.py` (modified, +8/-4)\n- `test/test_response.py`\
    \ (modified, +41/-0)\n\n## `src/urllib3/response.py`\n[Code changes omitted —\
    \ Planner should analyze the issue and guide the Executor]\n\n## Acceptance Criteria\n\
    \n1. All tests in the test suite pass: `pytest -x -q`\n2. No regressions in unchanged\
    \ functionality\n3. Fix matches the approach described in the issue/PR discussion\
    \ above\n\n## Important Notes\n\n- Only modify the source files listed above (not\
    \ test files)\n- The test files already encode the correct expected behaviour\n\
    - Run `pytest -x -q` to verify your fix"
