scenario: bugfix
task_id: 9
agents:
- agent_id: agent1
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# GH13: BaseHTTPMiddleware\
    \ Blocks on Background Tasks\n\n## Goal\n\nFix `middleware.py` so background tasks\
    \ attached to responses do not block\nsubsequent concurrent HTTP requests.\n\n\
    ## Requirements\n\n1. A health-check request sent concurrently with a main request\
    \ must respond\n   in under 2 seconds, even though the background task sleeps\
    \ for 3 seconds\n2. The main route (`/notify`, `/track`, or `/action`) must still\
    \ return 200\n3. The health route (`/health`, `/ping`, or `/status`) must still\
    \ return 200\n4. Background work must still execute (just not block the connection)\n\
    5. All tests in `test_app.py` pass: `pytest test_app.py -v`\n\n## Supporting Documents\n\
    \n- `middleware.py` — contains the buggy `BaseHTTPMiddleware` subclass\n- `app.py`\
    \ — Starlette application (correct, do not modify)\n- `test_app.py` — pytest-asyncio\
    \ tests\n\n## Contradiction / Hidden Complexity\n\nThe bug is structural: `BaseHTTPMiddleware`\
    \ keeps the ASGI send/receive\nlifecycle open until all `BackgroundTask` objects\
    \ on the response have\ncompleted. This is a known Starlette limitation\n(https://github.com/encode/starlette/issues/919).\
    \ A naive agent may try to\nmake the background task faster rather than fixing\
    \ the middleware architecture.\n\nThe fix requires replacing `BaseHTTPMiddleware`\
    \ with a raw ASGI middleware\nclass (or using `asyncio.create_task` to decouple\
    \ the work from the response\nlifecycle).\n\n## Important Notes\n\n- Fix is in\
    \ `middleware.py` only\n- Do NOT modify `app.py` or `test_app.py`\n- The background\
    \ task must still run — do not simply remove it"
- agent_id: agent2
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are the Executor. You only know the high-level problem below. You
    must ask the Planner for the specific fix details before proposing any code change
    -- do not guess at implementation details you were not given.


    # GH13: Background Task Blocks Requests (Brief)


    Fix the middleware so background tasks don''t block other concurrent requests.


    Currently a slow background task causes the health-check endpoint to wait

    several seconds instead of responding immediately.


    Verify with:

    ```

    pytest test_app.py -v

    ```


    **Files to fix:** `middleware.py`

    **Do NOT modify:** `app.py` or `test_app.py`


    Follow the Planner''s guidance precisely.'
- agent_id: agent3
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: You are the Verifier. Once the Executor proposes a fix, check it against
    the Planner's stated requirements and report whether it looks correct, complete,
    and doesn't break the stated invariants.
