agents:
- agent_id: agent1
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: "You are the Planner. You have the full technical specification below,\
    \ including the exact bug and the required fix. Relay the necessary details to\
    \ the Executor -- you cannot edit code yourself.\n\n# GH11: Middleware Error Handler\
    \ Ordering — Full Specification\n\n## Issue\n\nError handler middleware registered\
    \ with `app.use_error_handler(handler)` only catches\nexceptions from the immediately\
    \ next middleware in the pipeline, not from the entire\ndownstream chain. Errors\
    \ from handlers registered two or more positions after the error\nhandler slip\
    \ through uncaught.\n\n## Concrete Example\n\n```python\napp = App()\napp.use(logging_middleware)\
    \       # position 1\napp.use_error_handler(error_mw)   # position 2 — should\
    \ catch errors from 3, 4, 5\napp.use(auth_middleware)          # position 3\n\
    app.use(rate_limiter)             # position 4\napp.use(route_handler)       \
    \     # position 5 — raises ValueError(\"not found\")\n```\n\nWith the buggy implementation\
    \ the `ValueError` from step 5 is **NOT** caught by\n`error_mw` at step 2. It\
    \ propagates all the way out of the pipeline unhandled.\n\n## Root Cause\n\nIn\
    \ `Pipeline.execute(request)`, middleware is executed as a flat loop. When the\n\
    pipeline encounters an error handler it tries/catches only around the single next\n\
    middleware call:\n\n```python\nfor i, mw in enumerate(self._middlewares):\n  \
    \  if mw.is_error_handler:\n        try:\n            result = self._middlewares[i\
    \ + 1].func(request, response)\n        except Exception as e:\n            result\
    \ = mw.func(request, response, e)\n        skip_next = True   # skips only one\
    \ entry\n    else:\n        result = mw.func(request, response)\n```\n\nBecause\
    \ the `try/except` wraps only `pipeline[i+1]`, any exception raised by\n`pipeline[i+2]`,\
    \ `pipeline[i+3]`, … is never intercepted by the error handler.\n\n## The Fix\n\
    \nChange the pipeline execution from a flat loop to a **recursive chain** (or\
    \ an\nexplicit nested-closure stack). Each error handler must wrap\n`execute_remaining(pipeline[i+1:])`\
    \ — the entire suffix of the pipeline — so that\nany downstream error bubbles\
    \ up to it.\n\nA correct recursive approach:\n\n```python\ndef _run(self, middlewares,\
    \ request, response):\n    if not middlewares:\n        return response\n    mw\
    \ = middlewares[0]\n    rest = middlewares[1:]\n    if mw.is_error_handler:\n\
    \        try:\n            return self._run(rest, request, response)\n       \
    \ except Exception as e:\n            return mw.func(request, response, e)\n \
    \   else:\n        result = mw.func(request, response)\n        if result is not\
    \ None:\n            return result\n        return self._run(rest, request, response)\n\
    ```\n\n## Constraints\n\n- **Normal (non-error) middleware execution order must\
    \ remain the same** (FIFO,\n  registration order).\n- **`Request` and `Response`\
    \ classes are correct** — do not change them.\n- **Middleware registration order\
    \ must be respected** — `add()` / `add_error_handler()`\n  append to the same\
    \ ordered list.\n- Error handlers accept three arguments: `(request, response,\
    \ exception)`.\n- Normal middleware accepts two arguments: `(request, response)`.\n\
    - If a middleware or error handler returns a `Response` object, that terminates\
    \ the\n  chain (short-circuit).\n- If no error handler catches a propagating exception,\
    \ the exception escapes the\n  pipeline."
