task:
  content: '

    A legal review team is examining the following real contract clause:


    **Clause**


    The parties acknowledge that, in the course of performing their obligations under
    this Agreement, they may have access to confidential information of the other
    party. Each party agrees to keep such information confidential and not to disclose
    it to any third party, except as required by law or as necessary to perform its
    obligations under this Agreement. Each party shall take reasonable steps to protect
    the confidentiality of the other party''s confidential information and to prevent
    its unauthorized use or disclosure.


    Each reviewer will assess the clause from their own area of expertise.

    Discuss what risks or compliance issues (if any) the clause raises, share

    findings with the team, and converge on an overall risk assessment.

    '
  output_format: 'Respond in this format:

    **[Area]**

    Which compliance/risk area you are assessing this turn.


    **[Assessment]**

    Your finding: does the clause raise any issue in this area, and why.

    '
