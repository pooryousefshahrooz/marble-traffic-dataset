task:
  content: '

    Dear Research Team,


    You are collaborating to produce a research summary answering the following

    real research question (topic: Health):


    **Question**


    The significance of the gut microbiota in maintaining normal intestinal function
    has emerged as a prominent focus in contemporary research, revealing both beneficial
    and detrimental impacts on the equilibrium of gut health. Disruption of microbial
    homeostasis can precipitate intestinal inflammation and has been implicated in
    the pathogenesis of colorectal cancer. Conversely, probiotics have demonstrated
    the capacity to mitigate inflammation and retard the progression of colorectal
    cancer. Within this domain, key questions arise: What are the predominant types
    of gut probiotics? What precisely constitutes prebiotics and their mechanistic
    role? Which pathogenic bacteria warrant concern, and what toxic metabolites do
    they produce? How might these findings inform and optimize our daily dietary choices?


    Work together: each of you brings a different analytical lens to this

    question. Share findings, challenge each other''s assumptions, and converge

    on a well-supported answer.

    '
  output_format: 'Respond in this format:

    **[Contribution]**

    Your finding or argument this turn, from your analytical lens.


    **[Open Questions]**

    Anything you think the team still needs to address.

    '
