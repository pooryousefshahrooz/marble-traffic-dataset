task:
  content: '

    Dear Research Team,


    You are collaborating to produce a research summary answering the following

    real research question (topic: Health):


    **Question**


    Could the rapeutic interventions aimed at modulating plasma metal ion concentrations
    represent effective preventive or therapeutic strategies against cardiovascular
    diseases? What types of interventions—such as supplementation—have been proposed,
    and is there clinical evidence supporting their feasibility and efficacy?


    Work together: each of you brings a different analytical lens to this

    question. Share findings, challenge each other''s assumptions, and converge

    on a well-supported answer.

    '
  output_format: 'Respond in this format:

    **[Contribution]**

    Your finding or argument this turn, from your analytical lens.


    **[Open Questions]**

    Anything you think the team still needs to address.

    '
