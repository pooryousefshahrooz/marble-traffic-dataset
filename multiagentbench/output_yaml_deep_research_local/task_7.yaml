task:
  content: '

    Dear Research Team,


    You are collaborating to produce a research summary answering the following

    real research question (topic: Education & Jobs):


    **Question**


    Acting as an expert in K-12 education research and an experienced frontline teacher,
    research and analyze global case studies on the practical application of AIGC
    (AI-Generated Content) in primary and secondary school classrooms. Identify, categorize,
    and analyze various application approaches and their corresponding examples. The
    final report should present an overall framework, detailed category discussions,
    practical implementation methods, future trends, and recommendations for educators.


    Work together: each of you brings a different analytical lens to this

    question. Share findings, challenge each other''s assumptions, and converge

    on a well-supported answer.

    '
  output_format: 'Respond in this format:

    **[Contribution]**

    Your finding or argument this turn, from your analytical lens.


    **[Open Questions]**

    Anything you think the team still needs to address.

    '
