task:
  content: '

    Dear Research Team,


    You are collaborating to produce a research summary answering the following

    real research question (topic: Finance & Business):


    **Question**


    From 2020 to 2050, how many elderly people will there be in Japan? What is their
    consumption potential across various aspects such as clothing, food, housing,
    and transportation? Based on population projections, elderly consumer willingness,
    and potential changes in their consumption habits, please produce a market size
    analysis report for the elderly demographic.


    Work together: each of you brings a different analytical lens to this

    question. Share findings, challenge each other''s assumptions, and converge

    on a well-supported answer.

    '
  output_format: 'Respond in this format:

    **[Contribution]**

    Your finding or argument this turn, from your analytical lens.


    **[Open Questions]**

    Anything you think the team still needs to address.

    '
