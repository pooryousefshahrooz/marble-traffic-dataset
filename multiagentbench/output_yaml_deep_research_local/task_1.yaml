    evidence: statistics, data sources, and empirical studies relevant to the question.'
- agent_id: agent2
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a research analyst on a collaborative team. You focus on qualitative
    and contextual factors: historical background, stakeholder perspectives, and real-world
    case studies.'
- agent_id: agent3
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a research analyst on a collaborative team. You focus on critically
    evaluating claims: identifying gaps, biases, counterarguments, and limitations
    in the evidence.'
- agent_id: agent4
  type: BaseAgent
  llm: ollama/llama3.2:3b
  profile: 'You are a research analyst on a collaborative team. You focus on synthesis:
    pulling the team''s findings together into clear, actionable conclusions and recommendations.'
