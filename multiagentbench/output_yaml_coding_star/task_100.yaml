task:
  content: "Software Development Task:\n\nPlease write a program called NewsCollab\
    \ that facilitates collaborative content creation and verification among multiple\
    \ journalists and editors. NewsCollab is a comprehensive news application that\
    \ enables a team of journalists and editors to collaborate on news articles, verify\
    \ information, and publish content efficiently and securely.\n1. Implementation\
    \ requirements:\n   - The frontend should provide a user-friendly interface for\
    \ journalists and editors to create, edit, and manage news articles. It should\
    \ support features like real-time collaboration, version control, and commenting.\n\
    \   - The backend should handle the storage and retrieval of articles, user authentication,\
    \ and authorization. It should also include a verification module that checks\
    \ the credibility of sources and information using machine learning algorithms.\n\
    \   - The database should be designed to efficiently store and manage large volumes\
    \ of news articles, user data, and collaboration metadata. It should support fast\
    \ querying and data integrity.\n   - The system should include a notification\
    \ service that alerts users about new comments, changes, and verification statuses.\
    \ This service should be integrated with the frontend and backend to ensure seamless\
    \ communication.\n   - The application should support secure user authentication\
    \ and authorization, ensuring that only authorized users can access and modify\
    \ articles. It should also provide audit logs for tracking changes and user activities.\n\
    \   - The frontend and backend should communicate using RESTful APIs to ensure\
    \ smooth data flow and synchronization. The APIs should be well-documented and\
    \ follow best practices for security and performance.\n   - The application should\
    \ be scalable to handle a growing number of users and articles. It should be designed\
    \ to handle high traffic and large datasets without compromising performance or\
    \ security.\n\n\n2. Project structure:\n   - solution.py (main implementation)\n\
    \n3. Development process:\n   - Developer: Create the code.\n   - Developer: Revise\
    \ the code.\n   - Developer: Optimize the code.\n\nIf there are multiple files,\
    \ please put them all in solution.py, but remember to add the file name in the\
    \ following format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
agents:
