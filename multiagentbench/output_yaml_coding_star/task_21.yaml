task:
  content: "Software Development Task:\n\nPlease write a software application called\
    \ TeamSyncPro. TeamSyncPro is a collaborative schedule management system that\
    \ helps teams synchronize and manage their tasks, meetings, and projects efficiently.\
    \ It allows team members to input their tasks, set priorities, allocate time slots,\
    \ and track progress in real-time. The application also facilitates communication\
    \ among team members, provides reminders and notifications, and generates productivity\
    \ reports for analysis. Additionally, TeamSyncPro offers adaptive features that\
    \ dynamically adjust task assignments and schedules based on team member availability\
    \ and project priorities.\n1. Implementation requirements:\n   - The application\
    \ should allow multiple users to log in and manage their schedules and tasks collaboratively.\n\
    \   - It should provide real-time updates and synchronization of tasks, meetings,\
    \ and project statuses across all team members.\n   - The system should include\
    \ a communication module that enables team members to discuss tasks, share files,\
    \ and send messages within the application.\n   - The application must have a\
    \ feature to set task priorities, deadlines, and allocate time slots, with the\
    \ ability to track progress and completion status.\n   - It should offer adaptive\
    \ task and schedule management, where the system can automatically reassign tasks\
    \ or adjust schedules based on user feedback, availability, and project priorities.\n\
    \   - The application should generate productivity reports, including visual representations\
    \ of team schedules, task progress, and individual contributions.\n   - The system\
    \ should provide reminders and notifications to keep team members informed about\
    \ upcoming tasks, meetings, and deadlines.\n   - It should have a user-friendly\
    \ interface with clear visual cues and easy navigation to ensure smooth and efficient\
    \ use.\n   - The application should be scalable to support teams of varying sizes\
    \ and should be capable of handling a large number of tasks and projects simultaneously.\n\
    \n\n2. Project structure:\n   - solution.py (main implementation)\n\n3. Development\
    \ process:\n   - Developer: Create the code.\n   - Developer: Revise the code.\n\
    \   - Developer: Optimize the code.\n\nIf there are multiple files, please put\
    \ them all in solution.py, but remember to add the file name in the following\
    \ format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
