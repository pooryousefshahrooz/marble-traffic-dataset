task:
  content: "Software Development Task:\n\nPlease write a system called Multi-Agent\
    \ Code Analysis and Optimization (MACAO) that integrates code coverage, complexity\
    \ visualization, and size estimation functionalities into a single, collaborative\
    \ platform. MACAO is a comprehensive development tool that enables multiple developers\
    \ to work together to analyze and optimize code quality, coverage, and complexity,\
    \ while also estimating the size of the project. The system provides real-time\
    \ insights and recommendations, facilitating efficient teamwork and continuous\
    \ improvement in the development process.\n1. Implementation requirements:\n \
    \  - Develop a Code Coverage Module that analyzes the source code and unit tests,\
    \ calculating the percentage of code covered by tests. This module should generate\
    \ a heatmap visualizing the coverage, with color intensity indicating the level\
    \ of test coverage. This module must be completed before the Integration Module\
    \ can be developed.\n   - Create a Code Complexity Visualization Module that uses\
    \ metrics such as cyclomatic complexity, nesting depth, and code duplication to\
    \ generate interactive visualizations. This module should allow users to zoom\
    \ in and out, navigate through the code hierarchy, and explore the relationships\
    \ between different code components. It should also provide insights and recommendations\
    \ for simplifying and optimizing the code. This module must be completed before\
    \ the Integration Module can be developed.\n   - Build a Code Size Estimation\
    \ Module that analyzes the source code files and calculates the total number of\
    \ lines in the project. This module should provide developers with insights into\
    \ the scale of the project, allowing them to plan resources and timelines effectively.\
    \ This module must be completed before the Integration Module can be developed.\n\
    \   - Develop an Integration Module that combines the functionalities of the Code\
    \ Coverage Module, Code Complexity Visualization Module, and Code Size Estimation\
    \ Module into a single, user-friendly interface. This module should facilitate\
    \ collaborative work among multiple developers, allowing them to view and analyze\
    \ all the data in one place. It should also support real-time updates and notifications,\
    \ ensuring that all team members are aware of changes and improvements. This module\
    \ can only be developed after the Code Coverage Module, Code Complexity Visualization\
    \ Module, and Code Size Estimation Module are completed.\n   - Implement a Collaboration\
    \ Feature that enables multiple developers to work on the system simultaneously.\
    \ This feature should support real-time collaboration, version control, and user\
    \ permissions to ensure that team members can work together seamlessly and securely.\n\
    \   - Design a Reporting and Analytics Module that generates detailed reports\
    \ and analytics based on the data collected by the Code Coverage Module, Code\
    \ Complexity Visualization Module, and Code Size Estimation Module. This module\
    \ should provide developers with actionable insights and recommendations for improving\
    \ code quality and efficiency. This module can only be developed after the Integration\
    \ Module is completed.\n\n\n2. Project structure:\n   - solution.py (main implementation)\n\
    \n3. Development process:\n   - Developer: Create the code.\n   - Developer: Revise\
    \ the code.\n   - Developer: Optimize the code.\n\nIf there are multiple files,\
    \ please put them all in solution.py, but remember to add the file name in the\
    \ following format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
