task:
  content: "Software Development Task:\n\nPlease write a racing game system called\
    \ MultiTrackRacers that enables multiple AI agents to collaboratively design and\
    \ race on custom-built tracks. MultiTrackRacers is a multiplayer racing game system\
    \ that allows AI agents to work together to create unique race tracks, compete\
    \ against each other, and improve their vehicles through strategic upgrades and\
    \ modifications.\n1. Implementation requirements:\n   - 1. Track Design Module:\
    \ Develop a track design module that allows AI agents to collaboratively design\
    \ custom race tracks. This module must support the creation of different track\
    \ elements such as straight paths, curves, jumps, and obstacles. The track design\
    \ module must be completed before the AI agents can race on the tracks.\n   -\
    \ 2. Vehicle Customization Module: Implement a vehicle customization module that\
    \ enables AI agents to modify and upgrade their vehicles. This includes selecting\
    \ vehicle types, adjusting performance parameters (speed, acceleration, handling),\
    \ and adding special abilities (boosts, shields). The vehicle customization module\
    \ should be completed after the track design module to ensure that vehicles are\
    \ optimized for the specific tracks.\n   - 3. Racing Engine: Develop a racing\
    \ engine that simulates the races on the custom tracks. The racing engine should\
    \ handle real-time physics, collision detection, and scoring. AI agents must race\
    \ against each other, and the engine should provide real-time feedback and performance\
    \ metrics. The racing engine can only be fully functional once the track design\
    \ and vehicle customization modules are complete.\n   - 4. Collaboration and Communication\
    \ System: Implement a system that facilitates collaboration and communication\
    \ among AI agents. This system should allow agents to share track designs, vehicle\
    \ configurations, and race strategies. The collaboration system should be integrated\
    \ into the track design and vehicle customization modules to enhance the cooperative\
    \ aspects of the game.\n   - 5. Multiplayer and AI Integration: Ensure that the\
    \ game supports multiplayer modes and integrates AI agents that can compete against\
    \ human players. The AI agents should be capable of learning and adapting their\
    \ strategies based on the performance data from previous races. The multiplayer\
    \ and AI integration should be the final component to be completed, as it relies\
    \ on the functionality of the track design, vehicle customization, and racing\
    \ engine modules.\n\n\n2. Project structure:\n   - solution.py (main implementation)\n\
    \n3. Development process:\n   - Developer: Create the code.\n   - Developer: Revise\
    \ the code.\n   - Developer: Optimize the code.\n\nIf there are multiple files,\
    \ please put them all in solution.py, but remember to add the file name in the\
    \ following format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
