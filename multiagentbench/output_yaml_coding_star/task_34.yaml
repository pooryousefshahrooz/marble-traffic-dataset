task:
  content: "Software Development Task:\n\nPlease write a system called VideoCollabEditor\
    \ that provides a collaborative platform for multiple users to edit videos in\
    \ real-time. VideoCollabEditor is a collaborative video editing system that allows\
    \ multiple users to perform editing tasks such as cutting, cropping, and adding\
    \ effects to videos, with real-time synchronization and feedback mechanisms.\n\
    1. Implementation requirements:\n   - The system should support real-time collaboration,\
    \ allowing multiple users to edit the same video simultaneously with changes being\
    \ reflected immediately across all connected clients.\n   - Implement a user feedback\
    \ mechanism that allows users to suggest changes or provide comments on specific\
    \ sections of the video, which can be reviewed and applied by other users.\n \
    \  - The system should dynamically adjust to different user roles (e.g., editor,\
    \ reviewer, owner) with corresponding permissions and capabilities, ensuring that\
    \ changes are approved or reviewed as necessary.\n   - Support a variety of video\
    \ editing features, including cutting, cropping, resizing, and applying filters\
    \ or effects, with the ability to undo and redo actions.\n   - The system should\
    \ provide a history of changes, allowing users to track edits and revert to previous\
    \ versions if needed.\n   - Ensure the system can handle different video formats\
    \ and resolutions, and provide options to export the final edited video in multiple\
    \ formats suitable for various devices and platforms.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
