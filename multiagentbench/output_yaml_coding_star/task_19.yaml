task:
  content: "Software Development Task:\n\nPlease write a system called SportsTeamCollaborator\
    \ that facilitates the collaborative analysis of sports match data among multiple\
    \ agents (coaches, analysts, and players). SportsTeamCollaborator is a web-based\
    \ platform that allows users to upload and analyze sports match data, track player\
    \ performance, and share insights in real-time. The system supports the creation\
    \ of detailed reports, performance metrics, and interactive visualizations, and\
    \ it enables multiple users to collaborate on the analysis and provide feedback.\n\
    1. Implementation requirements:\n   - The system should allow users to upload\
    \ various types of sports match data, including video files, CSV files with performance\
    \ metrics, and live data streams.\n   - Implement a user role system with different\
    \ permissions for coaches, analysts, and players. Coaches should have full access\
    \ to all features, analysts should be able to perform data analysis and share\
    \ reports, and players should be able to view their performance metrics and receive\
    \ feedback.\n   - The system should provide real-time collaboration features,\
    \ such as shared notes, comments, and chat functionality, to facilitate communication\
    \ among users during the analysis process.\n   - Develop a comprehensive suite\
    \ of test cases to validate the system's functionality, including: \n- Uploading\
    \ different file types and data formats \n- User role management and permission\
    \ verification \n- Real-time collaboration features (e.g., shared notes, comments,\
    \ and chat) \n- Performance metric calculations and report generation \n- Handling\
    \ edge cases such as large file uploads, concurrent user edits, and network disruptions\n\
    \   - Ensure the system can handle large datasets efficiently and provide real-time\
    \ updates without significant latency.\n   - The system should be scalable to\
    \ support multiple teams and a large number of users, and it should include robust\
    \ security measures to protect user data and privacy.\n\n\n2. Project structure:\n\
    \   - solution.py (main implementation)\n\n3. Development process:\n   - Developer:\
    \ Create the code.\n   - Developer: Revise the code.\n   - Developer: Optimize\
    \ the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
