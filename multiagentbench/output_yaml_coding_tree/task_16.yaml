task:
  content: "Software Development Task:\n\nPlease write a software system called MultiAgent_Project_Manager.\
    \ MultiAgent_Project_Manager is a project management tool that facilitates the\
    \ coordination and tracking of tasks among multiple agents, ensuring that dependencies\
    \ are respected and tasks are completed in the correct order. It provides a user-friendly\
    \ interface for task creation, assignment, and monitoring, and it automatically\
    \ updates the project status based on the completion of dependent tasks.\n1. Implementation\
    \ requirements:\n   - The system should allow users to create projects and define\
    \ tasks within those projects, specifying the task name, description, and deadlines.\n\
    \   - Each task should have a list of dependencies, where certain tasks (e.g.,\
    \ Task A and Task B) must be completed before other tasks (e.g., Task C) can begin.\
    \ The system should enforce these dependencies and prevent the start of dependent\
    \ tasks until their prerequisites are completed.\n   - The system should provide\
    \ a dashboard for users to monitor the status of all tasks, including which tasks\
    \ are pending, in progress, and completed. It should also highlight any tasks\
    \ that are delayed or blocking progress.\n   - The system should support user\
    \ roles such as Project Manager, Team Lead, and Team Member, with different levels\
    \ of access and responsibilities. For example, Project Managers can create and\
    \ assign tasks, while Team Members can only view and update the status of their\
    \ assigned tasks.\n   - The system should send notifications to users when tasks\
    \ are assigned, when dependencies are met, and when tasks are completed. These\
    \ notifications should be configurable and can be sent via email or in-app messages.\n\
    \   - The system should have a history log that tracks all changes to tasks, including\
    \ assignments, status updates, and completion times, to help with project auditing\
    \ and performance reviews.\n\n\n2. Project structure:\n   - solution.py (main\
    \ implementation)\n\n3. Development process:\n   - Developer: Create the code.\n\
    \   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\nIf there\
    \ are multiple files, please put them all in solution.py, but remember to add\
    \ the file name in the following format:\n```python\n# file_name_1.py\n# your\
    \ code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n# your\
    \ code here\n```\n\nPlease work together to complete this task following software\
    \ engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
agents:
- type: CodingAgent
  agent_id: agent1
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am good at creating the code framework from scratch based on the task description
