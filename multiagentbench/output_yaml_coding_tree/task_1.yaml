task:
  content: "Software Development Task:\n\nPlease write a software system called CulturalExchangeHub\
    \ that facilitates collaborative cultural exchanges and learning experiences among\
    \ users from different parts of the world. CulturalExchangeHub is a web-based\
    \ platform that connects individuals through interactive sessions, including virtual\
    \ tours, language practice, and cultural workshops, while also providing tools\
    \ for users to share and learn from each other’s cultural backgrounds.\n1. Implementation\
    \ requirements:\n   - Develop a user registration and profile management system\
    \ to allow users to create accounts, upload profile pictures, and fill in cultural\
    \ backgrounds and interests. This system must be completed before any other features\
    \ can be integrated.\n   - Create a virtual tour module that allows users to explore\
    \ 3D models of cultural landmarks and historical sites. This module should include\
    \ interactive elements such as clickable hotspots for additional information and\
    \ audio guides. The virtual tour module must be built after the user registration\
    \ system is in place.\n   - Implement a language learning and practice feature\
    \ that pairs users for real-time language exchanges. This feature should include\
    \ a translation tool to assist in communication. The language learning module\
    \ can only be developed after the virtual tour module is functional.\n   - Design\
    \ a cultural workshop module that hosts live and pre-recorded sessions led by\
    \ cultural experts. Users should be able to join these sessions, ask questions,\
    \ and participate in discussions. This module should be developed after the language\
    \ learning feature is completed.\n   - Integrate a user feedback and rating system\
    \ to allow users to rate and review their experiences with the platform, including\
    \ the quality of virtual tours, language exchanges, and workshops. This system\
    \ should be implemented as the final step, after all other modules are in place.\n\
    \n\n2. Project structure:\n   - solution.py (main implementation)\n\n3. Development\
    \ process:\n   - Developer: Create the code.\n   - Developer: Revise the code.\n\
    \   - Developer: Optimize the code.\n\nIf there are multiple files, please put\
    \ them all in solution.py, but remember to add the file name in the following\
    \ format:\n```python\n# file_name_1.py\n# your code here\n\n# file_name_2.py\n\
    # your code here\n\n# file_name_3.py\n# your code here\n```\n\nPlease work together\
    \ to complete this task following software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
agents:
- type: CodingAgent
  agent_id: agent1
  profile: 'I am a Senior Software Developer specialized in Python development.

    I am good at creating the code framework from scratch based on the task description
