task:
  content: "Software Development Task:\n\nPlease write a program called LanguageCollaborator\
    \ that facilitates collaborative learning among multiple users by providing interactive\
    \ language exercises, real-time feedback, and peer review capabilities. LanguageCollaborator\
    \ is a web application that enables users to practice language skills, receive\
    \ instant feedback, and engage in peer-to-peer learning to enhance their language\
    \ proficiency.\n1. Implementation requirements:\n   - The program should support\
    \ multiple users logging in simultaneously and engaging in collaborative exercises.\n\
    \   - Each user should be able to create and share language exercises, which can\
    \ include grammar quizzes, vocabulary tests, and writing prompts.\n   - The system\
    \ should provide real-time feedback on exercises, such as correct/incorrect answers\
    \ for quizzes and grammar/vocabulary suggestions for writing prompts.\n   - Users\
    \ should be able to review and provide feedback on each other’s exercises, fostering\
    \ a collaborative learning environment.\n   - The application should include a\
    \ comprehensive set of test cases to validate the functionality, including:\n\
    \   -  - Input scenarios: Single user and multiple users logging in, creating\
    \ and sharing exercises, and providing peer reviews.\n   -  - Expected outputs:\
    \ Correct feedback on exercises, successful sharing of exercises among users,\
    \ and accurate peer reviews.\n   -  - Edge cases: Handling of invalid input, simultaneous\
    \ actions from multiple users, and scenarios where no peer reviews are available.\n\
    \   - The system should ensure data integrity and security, preventing unauthorized\
    \ access to user exercises and feedback.\n\n\n2. Project structure:\n   - solution.py\
    \ (main implementation)\n\n3. Development process:\n   - Developer: Create the\
    \ code.\n   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\
    \nIf there are multiple files, please put them all in solution.py, but remember\
    \ to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
