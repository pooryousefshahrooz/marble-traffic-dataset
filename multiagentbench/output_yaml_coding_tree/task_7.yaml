task:
  content: "Software Development Task:\n\nPlease write a social networking application\
    \ called CollaborateCraft that connects individuals passionate about crafting\
    \ and DIY projects. CollaborateCraft is a social networking application that enables\
    \ users to create profiles, share their projects, collaborate on group projects,\
    \ and provide feedback and support to others within the community.\n1. Implementation\
    \ requirements:\n   - The application should allow users to create profiles, including\
    \ a username, bio, and profile picture.\n   - Users should be able to post photos,\
    \ videos, and descriptions of their crafting projects, which can be tagged with\
    \ relevant categories (e.g., knitting, woodworking, painting).\n   - The application\
    \ should support the creation of group projects where multiple users can collaborate.\
    \ Each group project should have a project leader who can invite other users to\
    \ join, assign tasks, and track progress.\n   - Users should be able to comment\
    \ on and provide feedback on posts and group projects. The application should\
    \ support upvoting and downvoting of comments to highlight helpful feedback.\n\
    \   - The application should include a messaging system that allows users to communicate\
    \ privately and within group projects.\n   - The application should have a search\
    \ function that allows users to find other users, projects, and group projects\
    \ based on keywords, tags, and user profiles.\n   - Comprehensive test cases should\
    \ be provided, including input scenarios such as creating a profile, posting a\
    \ project, joining a group project, leaving a comment, sending a private message,\
    \ and searching for content. Expected outputs for each scenario should be clearly\
    \ defined.\n   - Edge cases to be validated include handling invalid inputs (e.g.,\
    \ empty fields, invalid image uploads), managing large numbers of users and projects,\
    \ and ensuring data consistency and integrity in group projects.\n\n\n2. Project\
    \ structure:\n   - solution.py (main implementation)\n\n3. Development process:\n\
    \   - Developer: Create the code.\n   - Developer: Revise the code.\n   - Developer:\
    \ Optimize the code.\n\nIf there are multiple files, please put them all in solution.py,\
    \ but remember to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
