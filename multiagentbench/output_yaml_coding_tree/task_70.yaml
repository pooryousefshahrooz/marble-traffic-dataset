task:
  content: "Software Development Task:\n\nPlease write a software application called\
    \ 'QuestHub' that integrates quest management, skill planning, and real-time collaboration\
    \ for role-playing game players. QuestHub is a comprehensive system that allows\
    \ players to manage quests, plan character skills, and collaborate with other\
    \ players in real-time, enhancing the overall gaming experience.\n1. Implementation\
    \ requirements:\n   - Frontend: Develop a user-friendly interface that allows\
    \ players to create, update, and complete quests. The interface should also support\
    \ the creation and management of character skill plans. Implement real-time collaboration\
    \ features that enable multiple players to work together on the same quest or\
    \ skill plan.\n   - Backend: Design and implement a robust backend system that\
    \ handles user authentication, data storage, and real-time communication. The\
    \ backend should support seamless synchronization of quest and skill data across\
    \ multiple devices and users.\n   - Database: Create a scalable and secure database\
    \ to store user profiles, quests, skill plans, and collaboration data. Ensure\
    \ that the database supports efficient querying and real-time updates.\n   - Integration:\
    \ Ensure that the frontend and backend systems are tightly integrated, allowing\
    \ for smooth data flow and real-time updates. Implement APIs for data exchange\
    \ between the frontend and backend, and ensure that the real-time collaboration\
    \ features are reliable and responsive.\n\n\n2. Project structure:\n   - solution.py\
    \ (main implementation)\n\n3. Development process:\n   - Developer: Create the\
    \ code.\n   - Developer: Revise the code.\n   - Developer: Optimize the code.\n\
    \nIf there are multiple files, please put them all in solution.py, but remember\
    \ to add the file name in the following format:\n```python\n# file_name_1.py\n\
    # your code here\n\n# file_name_2.py\n# your code here\n\n# file_name_3.py\n#\
    \ your code here\n```\n\nPlease work together to complete this task following\
    \ software engineering best practices."
  output_format: 'The final deliverable should include:

    solution.py

    '
